<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales - CC Tech</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #f5f9fc; }
    header { background: linear-gradient(135deg, #0d4a6b, #1a237e); color: white; padding: 1rem 2rem; position: sticky; top: 0; }
    .header-wrap { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    nav a { color: white; text-decoration: none; margin-left: 1.5rem; }
    .hero { background: linear-gradient(135deg, #667eea, #764ba2); color: white; text-align: center; padding: 3rem 1rem; }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .cats { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; justify-content: center; }
    .cat-btn { padding: 0.8rem 1.5rem; background: white; border-radius: 50px; cursor: pointer; font-weight: 600; border: none; }
    .cat-btn.active { background: #0d4a6b; color: white; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    .card img { width: 100%; height: 180px; object-fit: contain; background: #f8f9fa; padding: 1rem; }
    .card-body { padding: 1.5rem; }
    .card-body h3 { color: #0d4a6b; margin-bottom: 0.5rem; }
    .price { font-size: 1.5rem; color: #ff9800; font-weight: 700; margin: 0.5rem 0; }
    .btn-group { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .btn { flex: 1; padding: 0.8rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; color: white; }
    .cart { background: #ff9800; }
    .chat { background: #25d366; }
  </style>
</head>
<body>
  <header>
    <div class="header-wrap">
      <h2>CC Tech</h2>
      <nav>
        <a href="index.html">Home</a>
        <a href="service-dynamic.html">Service</a>
        <a href="admin.html">Admin</a>
      </nav>
    </div>
  </header>
  
  <div class="hero">
    <h1><i class="fas fa-shopping-bag"></i> Sales Store</h1>
    <p>Browse products • Chat on WhatsApp • Add to cart</p>
  </div>
  
  <div class="container">
    <div class="cats" id="cats"></div>
    <div class="grid" id="grid"></div>
  </div>

  <script src="database.js"></script>
  <script>
    let DB = JSON.parse(JSON.stringify(CCData));
    if(localStorage.getItem('cctech_db')) Object.assign(DB, JSON.parse(localStorage.getItem('cctech_db')));
    let activeCat = 'All';

    function init() {
      document.getElementById('cats').innerHTML = 
        `<button class="cat-btn ${activeCat==='All'?'active':''}" onclick="filter('All')">All</button>` + 
        DB.salesCategories.map(c=>`<button class="cat-btn ${activeCat===c?'active':''}" onclick="filter('${c}')">${c}</button>`).join('');
      render();
    }

    function filter(cat) { activeCat = cat; init(); }

    function render() {
      const items = activeCat === 'All' ? DB.products : DB.products.filter(p => p.category === activeCat);
      document.getElementById('grid').innerHTML = items.map(p => `
        <div class="card">
          <img src="${p.image}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2920/2920277.png'">
          <div class="card-body">
            <span style="background:#e3f2fd; color:#0d4a6b; padding:0.2rem 0.6rem; border-radius:10px; font-size:0.85rem;">${p.category}</span>
            <h3>${p.name}</h3>
            <p style="color:#666; font-size:0.95rem; margin:0.5rem 0;">${p.desc}</p>
            <div class="price">₹${p.price.toLocaleString()} <small style="color:#999; font-weight:normal;">${p.type}</small></div>
            <div class="btn-group">
              <button class="btn cart" onclick="addToCart(${p.id})"><i class="fas fa-cart-plus"></i> Add to Cart</button>
              <button class="btn chat" onclick="chatWA('${p.name}', ${p.price}, '${p.category}')"><i class="fab fa-whatsapp"></i> Chat</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function chatWA(name, price, cat) {
      const msg = `Hi CC Tech! I'm interested in: ${name}%0ACategory: ${cat}%0APrice: ₹${price}%0APlease share availability & delivery details.`;
      window.open(`https://wa.me/${DB.whatsapp}?text=${msg}`, '_blank');
    }

    function addToCart(id) {
      const p = DB.products.find(x => x.id === id);
      let cart = JSON.parse(localStorage.getItem('cctech_cart')) || [];
      const ex = cart.find(i => i.id === p.id);
      if(ex) ex.qty++; else cart.push({...p, qty: 1});
      localStorage.setItem('cctech_cart', JSON.stringify(cart));
      alert('✅ Added to Cart!');
    }

    init();
  </script>
</body>
</html>
