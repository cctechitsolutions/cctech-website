<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CC Tech IT Solutions | Home</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: linear-gradient(135deg, #0d4a6b, #1a237e); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 2rem; }
    .logo { font-size: 4rem; margin-bottom: 1rem; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    h1 { font-size: 3rem; margin-bottom: 1rem; }
    p { font-size: 1.3rem; margin-bottom: 3rem; opacity: 0.9; }
    .buttons { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; max-width: 800px; width: 100%; }
    .btn { background: white; color: #0d4a6b; padding: 2rem; border-radius: 15px; text-decoration: none; font-size: 1.5rem; font-weight: bold; transition: transform 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .btn:hover { transform: translateY(-10px); }
    .btn.sales { border: 4px solid #ff9800; }
    .btn.service { border: 4px solid #4caf50; }
    .btn i { display: block; font-size: 3rem; margin-bottom: 1rem; }
    .sales i { color: #ff9800; }
    .service i { color: #4caf50; }
    .footer { margin-top: 3rem; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.2); }
    .footer p { font-size: 1rem; margin: 0.5rem 0; }
  </style>
</head>
<body>
  <div class="logo"><i class="fas fa-microchip"></i></div>
  <h1>CC Tech IT Solutions</h1>
  <p>Your Trusted IT Partner in Bengaluru</p>
  
  <div class="buttons">
    <a href="sales-dynamic.html" class="btn sales">
      <i class="fas fa-shopping-cart"></i>
      SALES<br>
      <small style="font-size:1rem; font-weight:normal;">Shop Software, Hardware & More</small>
    </a>
    <a href="service-dynamic.html" class="btn service">
      <i class="fas fa-tools"></i>
      SERVICE<br>
      <small style="font-size:1rem; font-weight:normal;">Installation, Repair & Support</small>
    </a>
  </div>
  
  <div class="footer">
    <p style="font-size: 1rem; margin: 0.5rem 0;"><i class="fas fa-phone"></i> 063642 53615 | 089517 11631</p>
    <p style="font-size: 1rem; margin: 0.5rem 0;"><i class="fas fa-map-marker-alt"></i> Yelahanka, Bengaluru</p>
  </div>
</body>
</html>
